version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: payment_mysql
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: payment_app
    ports:
      - '3333:3333'
    environment:
      - NODE_ENV=development
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_DATABASE=payment_db
      - APP_KEY=2wwaLcLzSYWa26netuCylzPFZWnIa1KV
    depends_on:
      - mysql
    volumes:
      - .:/app
      - /app/node_modules

  gateways-mock:
    image: matheusprotzen/gateways-mock
    container_name: payment_gateways_mock
    ports:
      - '3001:3001'
      - '3002:3002'

volumes:
  mysql_data:
